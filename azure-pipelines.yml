trigger:
- main

variables:
  imageName: flask-app
  acrName: flaskacrdev12345        # 👈 your Terraform ACR name
  aksCluster: flask-aks-dev        # 👈 your Terraform AKS name
  resourceGroup: flask-dev-rg      # 👈 your Terraform RG

stages:

# 🔷 STAGE 1: TERRAFORM (INFRA CREATION)
- stage: Terraform
  displayName: "Provision Infrastructure"
  jobs:
  - job: TerraformApply
    pool:
      vmImage: ubuntu-latest

    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - script: |
        cd terraform/envs/dev

        terraform init \
          -backend-config="../../backend/backend.tf"

        terraform apply -auto-approve
      displayName: "Terraform Apply"

      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

# 🔷 STAGE 2: BUILD & PUSH IMAGE
- stage: Build
  displayName: "Build and Push Docker Image"
  dependsOn: Terraform

  jobs:
  - job: BuildPush
    pool:
      vmImage: ubuntu-latest

    steps:
    - task: Docker@2
      displayName: "Build and Push Image"
      inputs:
        containerRegistry: 'acr-connection'   # 👈 existing service connection
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: latest

# 🔷 STAGE 3: DEPLOY TO AKS
- stage: Deploy
  displayName: "Deploy to AKS"
  dependsOn: Build

  jobs:
  - job: DeployAKS
    pool:
      vmImage: ubuntu-latest

    steps:
    - task: AzureCLI@2
      displayName: "Get AKS Credentials"
      inputs:
        azureSubscription: 'azure-connection'   # 👈 your Azure RM service connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials \
            --name $(aksCluster) \
            --resource-group $(resourceGroup) \
            --overwrite-existing

    - task: KubernetesManifest@1
      displayName: "Deploy Kubernetes Manifests"
      inputs:
        action: deploy
        kubernetesServiceConnection: 'aks-k8s-connection'
        namespace: default
        manifests: |
          k8s/deployment.yaml
          k8s/service.yaml