apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
      - name: flask-app
        image: flaskacr12345.azurecr.io/flask-app:latest
        ports:
        - containerPort: 5000
      imagePullSecrets:
        - name: acr-secret  